<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Экспосом Крыма — Пространственная Эпидемиология</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <aside id="sidebar" class="hidden">
            <div class="sidebar-drag-handle"></div>

            <div class="sidebar-header">
                <div class="location-info">
                    <h2 id="location-name">Анализ локации...</h2>
                    <p id="coords" class="coords-text">Кликните на карту</p>
                </div>
                <button id="close-btn" aria-label="Закрыть">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="sidebar-content">
                <div class="norm-card hidden" id="norm-container">
                    <svg class="norm-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    <div class="norm-text">
                        <span class="norm-label">Ориентир (СанПиН / ВОЗ):</span>
                        <span id="factor-norm">Загрузка...</span>
                    </div>
                </div>

                <div class="metric-card primary-metric">
                    <div class="metric-header">
                        <span id="factor-icon" class="metric-icon"></span>
                        <span id="factor-name" class="metric-label">Показатель</span>
                    </div>
                    <div class="metric-body">
                        <span id="value-loading" class="typing-indicator hidden">
                            <span></span><span></span><span></span>
                        </span>
                        <span id="factor-value" class="metric-value">—</span>
                        <span id="factor-unit" class="metric-unit"></span>
                    </div>
                </div>

                <div class="ai-block single-factor-ai">
                    <div class="ai-header">
                        <svg class="ai-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                        </svg>
                        <h3>Медицинское заключение</h3>
                    </div>
                    <div id="ai-loading" class="typing-indicator hidden">
                        <span></span><span></span><span></span>
                    </div>
                    <p id="ai-text" class="ai-text">—</p>
                </div>

                <button id="btn-complex" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    Комплексная оценка экспосома
                </button>

                <div id="complex-result-block" class="ai-block complex-ai hidden">
                    <div class="ai-header">
                        <svg class="ai-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                        </svg>
                        <h3>Синергетическое воздействие</h3>
                    </div>
                    <div id="complex-loading" class="typing-indicator hidden">
                        <span></span><span></span><span></span>
                    </div>
                    <p id="complex-text" class="ai-text"></p>
                </div>
            </div>
        </aside>

        <main id="map-wrapper">
            <div class="layer-controls">
                <div class="layer-brand">
                    <img src="logo.png" alt="Urban Exposome Logo" class="brand-logo">
                    <div class="brand-text">
                        <h2>Городской экспосом</h2>
                        <span>Пространственная аналитика Крыма</span>
                    </div>
                </div>
                <div class="layer-buttons">
                    <button class="layer-btn active" data-layer="light" title="Световое загрязнение">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5" />
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </svg>
                        <span class="btn-text">Свет</span>
                    </button>
                    <button class="layer-btn" data-layer="heat" title="Тепловые острова">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
                        </svg>
                        <span class="btn-text">Тепло</span>
                    </button>
                    <button class="layer-btn" data-layer="no2" title="Диоксид азота">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
                        </svg>
                        <span class="btn-text">NO₂</span>
                    </button>
                    <button class="layer-btn" data-layer="noise" title="Акустический шум">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        </svg>
                        <span class="btn-text">Шум</span>
                    </button>
                </div>
            </div>
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
